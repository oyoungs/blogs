<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="30" fill="#faf8f5" stroke="#c9b896" stroke-width="1"/>
  
  <!-- 书卷边框 -->
  <rect x="8" y="12" width="48" height="28" rx="2" fill="#f5f0e6" stroke="#d4c4a8" stroke-width="0.5"/>
  
  <!-- 文字 -->
  <text x="32" y="33" 
        font-family="'STKaiti', 'KaiTi', serif" 
        font-size="20" 
        font-weight="bold"
        fill="url(#inkGrad)"
        text-anchor="middle"
        dominant-baseline="middle">
    逗学堂
  </text>
  
  <!-- 小印章 -->
  <rect x="42" y="36" width="14" height="7" rx="1" fill="none" stroke="#b83b3b" stroke-width="0.8"/>
  <text x="49" y="41" 
        font-family="serif" 
        font-size="5" 
        fill="#b83b3b"
        text-anchor="middle">
    逗学
  </text>
</svg>
